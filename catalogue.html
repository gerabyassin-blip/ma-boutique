<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Catalogue — Ma Boutique</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .grille { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 25px; margin-top: 25px; }
    .carte { background: white; border-radius: 10px; padding: 20px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .carte img { width: 100%; border-radius: 6px; }
    .carte h3 { margin: 12px 0 6px; }
    .carte .prix { color: #e74c3c; font-size: 22px; font-weight: bold; }
  </style>
</head>
<body>
  <nav>
    <span class="logo">🛍️ Ma Boutique</span>
    <a href="index.html">Accueil</a>
    <a href="catalogue.html">Catalogue</a>
    <a href="assistance.html">Assistance</a>
    <a href="litiges.html">Litiges / CGV</a>
    <a href="mentions.html">Mentions légales</a>
  </nav>
  <div class="container">
    <h1>📦 Notre catalogue</h1>
    <div class="grille">
      <div class="carte">
        <img src="https://via.placeholder.com/250x180?text=Casque" alt="Casque Audio">
        <h3>Casque Audio Pro X</h3>
        <p style="color:#666; font-size:14px;">Son immersif — Autonomie 30h</p>
        <div class="prix">49,99 €</div>
        <br>
        <a href="produit.html" class="btn">Voir le produit</a>
      </div>
    </div>
  </div>
  <footer>
    <p>© 2025 Ma Boutique — <a href="mentions.html">Mentions légales</a></p>
  </footer>
</body>
</html>
